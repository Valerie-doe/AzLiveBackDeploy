# Configuration MediaMTX pour AZLive — pont WebRTC (navigateur) -> RTMPS (Facebook Live)
#
# ⚠️ UNIQUEMENT POUR DOCKER (conteneur Linux).
# Sur Windows NATIF, utilisez mediamtx.windows.yml ou start-mediamtx-windows.bat
# (host.docker.internal n'existe pas hors Docker -> auth WHIP echoue).
# Django provisionne dynamiquement un "path" par live (via l'API de contrôle) ;
# ce path lance ffmpeg (runOnReady) qui relaie le flux vers secure_stream_url de Facebook.
# L'authentification de chaque publication est déléguée à Django (authHTTPAddress).

###############################################
# Général
logLevel: info
logDestinations: [stdout]

# Lire/écrire la configuration des paths à chaud via l'API de contrôle.
api: yes
apiAddress: :9997

###############################################
# Authentification déléguée à Django.
# MediaMTX appelle cette URL pour autoriser chaque action (publish/read...).
# host.docker.internal pointe vers la machine hôte depuis le conteneur.
authMethod: http
# network_mode: host (docker-compose) → Django est sur la même machine : 127.0.0.1
# (host.docker.internal casse souvent l'auth WHIP sous Linux → HTTP 401)
authHTTPAddress: http://127.0.0.1:8000/api/media/auth/
# On n'authentifie pas les appels à l'API de contrôle (réservée au backend en local).
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

###############################################
# WebRTC (entrée WHIP depuis le navigateur)
webrtc: yes
webrtcAddress: :8889
# En production, renseigner les adresses IP publiques / serveurs ICE :
# webrtcAdditionalHosts: [VOTRE_IP_PUBLIQUE]
# webrtcICEServers2:
#   - url: stun:stun.l.google.com:19302

###############################################
# RTSP : utilisé en interne par ffmpeg pour relire le flux publié (rtsp://localhost:8554/<path>)
rtsp: yes
rtspAddress: :8554

# RTMP/HLS désactivés : on n'en a pas besoin pour ce pont.
rtmp: no
hls: no
srt: no

###############################################
# Aucun path statique : ils sont tous créés dynamiquement par Django via l'API.
# On ne définit PAS de catch-all "all_others" pour qu'une publication vers un path
# non provisionné soit refusée.
paths: {}
