# MediaMTX pour AZLive (diffusion navigateur -> Facebook Live).
#
# Image "-ffmpeg" : indispensable car le relais vers Facebook utilise ffmpeg (runOnReady).
#
# Lancement :
#   cd mediamtx && docker compose up -d
# Logs :
#   docker compose logs -f
#
# Ports :
#   8889  WebRTC / WHIP (le navigateur publie ici)
#   9997  API de contrôle (Django provisionne les paths)
#   8554  RTSP interne (ffmpeg relit le flux)
#   8189  WebRTC ICE/UDP (négociation des candidats)

services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: azlive-mediamtx
    restart: unless-stopped
    network_mode: host
    # network_mode host : MediaMTX a besoin de plages UDP pour WebRTC, et doit joindre
    # Django sur localhost:8000. Sous Linux, host networking simplifie tout cela.
    # (Sur Docker Desktop macOS/Windows, retirer network_mode et exposer les ports +
    #  remplacer host.docker.internal dans mediamtx.yml en conséquence.)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
