<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AZLive — Diffusion navigateur (test WHIP)</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; background:#0f1115; color:#e8eaed; margin:0; padding:24px; }
    h1 { font-size:20px; margin:0 0 16px; }
    .card { max-width:760px; margin:0 auto; background:#171a21; border:1px solid #262b36; border-radius:12px; padding:20px; }
    label { display:block; font-size:13px; color:#9aa3b2; margin:12px 0 4px; }
    input { width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #2d333f; background:#0f1115; color:#e8eaed; font-size:14px; }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; }
    button { margin-top:16px; padding:12px 18px; border:0; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
    .start { background:#2f6df6; color:#fff; }
    .stop { background:#e2483d; color:#fff; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    video { width:100%; border-radius:10px; margin-top:16px; background:#000; aspect-ratio:16/9; }
    #log { margin-top:16px; font-family:ui-monospace, monospace; font-size:12px; white-space:pre-wrap; background:#0b0d11; border:1px solid #20242e; border-radius:8px; padding:12px; max-height:180px; overflow:auto; }
    .status { font-size:13px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AZLive — Démarrer un live depuis le navigateur</h1>
    <p class="status">Référence WHIP : 1 clic → webcam → MediaMTX → Facebook Live. À intégrer dans le vrai frontend.</p>

    <div class="row">
      <div>
        <label for="api">URL backend (API Django)</label>
        <input id="api" value="http://localhost:8000" />
      </div>
      <div>
        <label for="liveId">ID du live</label>
        <input id="liveId" value="1" />
      </div>
    </div>
    <label for="authToken">Token d'auth Django (optionnel, header Token)</label>
    <input id="authToken" placeholder="laisser vide si l'endpoint est AllowAny" />

    <video id="preview" autoplay muted playsinline></video>

    <div class="row">
      <button id="startBtn" class="start">Démarrer le live</button>
      <button id="stopBtn" class="stop" disabled>Arrêter</button>
    </div>

    <div id="log"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $('log');
    const log = (m) => { logEl.textContent += m + '\n'; logEl.scrollTop = logEl.scrollHeight; console.log(m); };

    let pc = null;
    let stream = null;
    let currentLiveId = null;

    function headers(extra = {}) {
      const h = { ...extra };
      const t = $('authToken').value.trim();
      if (t) h['Authorization'] = 'Token ' + t;
      return h;
    }

    async function startLive() {
      $('startBtn').disabled = true;
      try {
        const api = $('api').value.replace(/\/$/, '');
        currentLiveId = $('liveId').value.trim();

        // 1) Demander au backend de démarrer le live (crée le live FB + provisionne MediaMTX).
        log('→ Démarrage du live côté serveur…');
        const res = await fetch(`${api}/api/lives/${currentLiveId}/demarrer/`, {
          method: 'POST',
          headers: headers({ 'Content-Type': 'application/json' }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || ('HTTP ' + res.status));

        const webrtc = data.live?.diffusion_plateformes?.webrtc;
        if (!webrtc || webrtc.status !== 'ready') {
          throw new Error('Pont WebRTC indisponible: ' + JSON.stringify(webrtc));
        }
        log('✓ Live créé. WHIP: ' + webrtc.whip_url);

        // 2) Caméra + micro
        log('→ Accès à la webcam…');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720 }, audio: true,
        });
        $('preview').srcObject = stream;

        // 3) Publier en WHIP vers MediaMTX
        await publishWhip(webrtc.whip_url, webrtc.publish_token, stream);

        log('✓ En direct ! La vidéo arrive sur Facebook dans quelques secondes.');
        $('stopBtn').disabled = false;
      } catch (e) {
        log('✗ Erreur: ' + e.message);
        await cleanup();
        $('startBtn').disabled = false;
      }
    }

    // Implémentation minimale du protocole WHIP (WebRTC-HTTP Ingestion Protocol).
    async function publishWhip(whipUrl, token, mediaStream) {
      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      });
      mediaStream.getTracks().forEach((track) => pc.addTrack(track, mediaStream));

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitIceGathering(pc);

      log('→ Envoi de l’offre SDP (WHIP)…');
      const res = await fetch(whipUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/sdp',
          ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
        },
        body: pc.localDescription.sdp,
      });
      if (!res.ok) throw new Error('WHIP a refusé la publication: HTTP ' + res.status);
      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    }

    function waitIceGathering(pc) {
      if (pc.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise((resolve) => {
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
        setTimeout(resolve, 2000); // garde-fou
      });
    }

    async function stopLive() {
      $('stopBtn').disabled = true;
      const api = $('api').value.replace(/\/$/, '');
      try {
        await fetch(`${api}/api/lives/${currentLiveId}/arreter/`, {
          method: 'POST', headers: headers({ 'Content-Type': 'application/json' }),
        });
        log('✓ Live arrêté côté serveur.');
      } catch (e) {
        log('✗ Erreur à l’arrêt: ' + e.message);
      }
      await cleanup();
      $('startBtn').disabled = false;
    }

    async function cleanup() {
      if (pc) { try { pc.close(); } catch (_) {} pc = null; }
      if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
      $('preview').srcObject = null;
    }

    $('startBtn').addEventListener('click', startLive);
    $('stopBtn').addEventListener('click', stopLive);
  </script>
</body>
</html>
