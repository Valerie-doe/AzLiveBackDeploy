# Configuration MediaMTX pour AZLive — VERSION WINDOWS (binaire natif)
#
# Identique à mediamtx.yml, sauf que MediaMTX tourne en natif (pas dans Docker) :
#   - authHTTPAddress pointe vers localhost (et non host.docker.internal)
#   - webrtcAdditionalHosts force les candidats ICE sur 127.0.0.1 (WebRTC local fiable)
#
# Lancement :
#   cd mediamtx
#   .\mediamtx.exe mediamtx.windows.yml

###############################################
# Général
logLevel: info
logDestinations: [stdout]

# Lire/écrire la configuration des paths à chaud via l'API de contrôle.
api: yes
apiAddress: :9997

###############################################
# Authentification déléguée à Django (MediaMTX tourne en natif -> localhost).
authMethod: http
authHTTPAddress: http://localhost:8000/api/media/auth/
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

###############################################
# WebRTC (entrée WHIP depuis le navigateur)
webrtc: yes
webrtcAddress: :8889
# En natif sur la même machine, on annonce explicitement l'hôte local pour l'ICE.
webrtcAdditionalHosts: [127.0.0.1]
webrtcLocalUDPAddress: :8189

###############################################
# RTSP : utilisé en interne par ffmpeg pour relire le flux publié (rtsp://localhost:8554/<path>)
rtsp: yes
rtspAddress: :8554

# RTMP/HLS désactivés : on n'en a pas besoin pour ce pont.
rtmp: no
hls: no
srt: no

###############################################
# Aucun path statique : ils sont tous créés dynamiquement par Django via l'API.
paths: {}
